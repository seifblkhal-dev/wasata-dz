<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WASATA-DZ | المنصة الرسمية</title>
    <style>
        body { background-color: #050505; color: white; font-family: Arial, sans-serif; margin: 0; text-align: center; }
        .header-line { background-color: #00ff41; height: 2px; width: 100%; }
        nav { background-color: #000; padding: 15px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: 14px; }
        .main-title { color: #00ff41; font-size: 45px; margin-top: 30px; }
        
        /* الأقسام الجديدة */
        .section-container { width: 90%; max-width: 1000px; margin: 20px auto; background-color: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px; padding: 20px; text-align: right; }
        .section-head { color: #00ff41; border-right: 3px solid #00ff41; padding-right: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { color: #00ff41; padding: 10px; border-bottom: 1px solid #1a1a1a; }
        td { padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .btn-order { background-color: #00ff41; color: black; padding: 8px 20px; border-radius: 4px; text-decoration: none; font-weight: bold; }

        /* شبكة الوسطاء الأصلية */
        .mediators-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 90%; margin: 40px auto; }
        .med-card { background-color: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px; padding: 20px; }
        .med-img-box { width: 90px; height: 40px; border: 1px solid #00ff41; border-radius: 20px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .contact-btn { display: block; border: 1px solid #00ff41; color: #00ff41; padding: 8px; text-decoration: none; border-radius: 4px; margin-top: 15px; }
        @media (max-width: 850px) { .mediators-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header-line"></div>
    <nav>
        <a href="#shipping">قسم الشحن</a>
        <a href="#accounts">عرض الحسابات</a>
        <a href="#mediators">الوسطاء</a>
    </nav>

    <h1 class="main-title">WASATA-DZ</h1>
    
    <!-- فرع الشحن -->
    <div id="shipping" class="section-container">
        <h2 class="section-head">شحن eFootball (بيس)</h2>
        <table>
            <tr><th>الكمية</th><th>السعر</th><th>الطلب</th></tr>
            <tr><td>1040 كوينز</td><td>2100 DA</td><td><a href="#" class="btn-order">اطلب</a></td></tr>
        </table>
    </div>

    <!-- الوسطاء بالأسماء الصحيحة -->
    <h2 id="mediators" style="color: #00ff41;">الوسطاء المعتمدون</h2>
    <div class="mediators-grid">
        <script>
            // الأسماء الحقيقية التي ذكرتها
            const realNames = ["سيف", "عبد الله", "فهد", "حمزة", "ياسين", "فارس", "بلال", "طارق", "أيوب", "وليد", "أسامة", "زينو", "رياض", "إسلام"];
            realNames.forEach(name => {
                document.write(`
                    <div class="med-card">
                        <div class="med-img-box"><span style="color:#00ff41; font-size:10px;">LOGO</span></div>
                        <div style="font-weight:bold">${name}</div>
                        <a href="#" class="contact-btn">تواصل</a>
                    </div>
                `);
            });
        </script>
    </div>
</body>
</html>
